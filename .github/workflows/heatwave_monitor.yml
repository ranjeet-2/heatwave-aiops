name: Heatwave Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes (testing)
    # - cron: '0 */2 * * *'  # Every 2 hours (production)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EE_PROJECT_ID: ${{ secrets.EE_PROJECT_ID }}
          EE_SERVICE_ACCOUNT_JSON: ${{ secrets.EE_SERVICE_ACCOUNT_JSON }}
        run: python src/main.py

      - name: Commit updated outputs to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Update heatwave outputs"
          git push
          
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:    
          name: heatwave-report
          path: outputs/
